name: OpenShell Sandbox (Docker)

permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:

jobs:
  sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker
        run: docker --version

      - uses: astral-sh/setup-uv@v6

      - name: Install OpenShell CLI
        run: |
          uv tool install openshell
          openshell --version

      - name: Download openshell-gateway
        run: |
          gh release download --repo NVIDIA/OpenShell --pattern "openshell-gateway-x86_64-unknown-linux-gnu.tar.gz" --dir /tmp/openshell-gateway
          tar xzf /tmp/openshell-gateway/openshell-gateway-x86_64-unknown-linux-gnu.tar.gz -C /usr/local/bin
          rm -rf /tmp/openshell-gateway
          openshell-gateway --version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: |
          START_TIME=$(date +%s%3N)
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull ghcr.io/nvidia/openshell/supervisor:latest
          docker pull ghcr.io/nvidia/openshell-community/sandboxes/base:latest
          END_TIME=$(date +%s%3N)
          ELAPSED=$(( END_TIME - START_TIME ))
          echo "::notice::Image pull: ${ELAPSED}ms"

      - name: Start gateway
        run: |
          HANDSHAKE_SECRET="ci-$(python3 -c 'import secrets; print(secrets.token_hex(16))')"

          START_TIME=$(date +%s%3N)

          OPENSHELL_SSH_HANDSHAKE_SECRET="${HANDSHAKE_SECRET}" \
          OPENSHELL_SUPERVISOR_IMAGE="ghcr.io/nvidia/openshell/supervisor:latest" \
          openshell-gateway \
            --bind-address 0.0.0.0 \
            --port 8080 \
            --health-port 8081 \
            --ssh-gateway-port 8080 \
            --grpc-endpoint http://host.docker.internal:8080 \
            --drivers docker \
            --disable-tls \
            --db-url "sqlite:/tmp/gateway.db?mode=rwc" \
            --sandbox-image "ghcr.io/nvidia/openshell-community/sandboxes/base:latest" \
            --sandbox-image-pull-policy missing \
            --log-level info &
          echo "GATEWAY_PID=$!" >> "$GITHUB_ENV"

          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8081/healthz >/dev/null 2>&1 && break
            sleep 2
          done

          END_TIME=$(date +%s%3N)
          ELAPSED=$(( END_TIME - START_TIME ))
          echo "::notice::Gateway startup: ${ELAPSED}ms"

      - name: Register gateway with CLI
        run: |
          CONFIG_DIR="${XDG_CONFIG_HOME:-$HOME/.config}/openshell"
          mkdir -p "${CONFIG_DIR}/gateways/ci-gateway"
          cat > "${CONFIG_DIR}/gateways/ci-gateway/metadata.json" <<'EOF'
          {
            "name": "ci-gateway",
            "gateway_endpoint": "http://127.0.0.1:8080",
            "is_remote": false,
            "gateway_port": 8080,
            "auth_mode": "plaintext"
          }
          EOF
          printf 'ci-gateway' > "${CONFIG_DIR}/active_gateway"

      - name: Create sandbox
        run: |
          START_TIME=$(date +%s%3N)
          openshell sandbox create --name smoke-test -- echo "sandbox is working"
          END_TIME=$(date +%s%3N)
          ELAPSED=$(( END_TIME - START_TIME ))
          echo "::notice::Sandbox create + exec: ${ELAPSED}ms"

      - name: Cleanup
        if: always()
        run: |
          openshell sandbox delete smoke-test 2>/dev/null || true
          kill "${GATEWAY_PID}" 2>/dev/null || true
