# fullsend shim workflow
# Routes events to agent workflows in .fullsend via the dispatch action.
#
# Security: pull_request_target runs the BASE branch version of this workflow,
# preventing PRs from modifying it to exfiltrate credentials. The dispatch
# action (hosted in .fullsend) never checks out PR code.
name: fullsend

permissions:
  contents: read

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: ${{ github.repository_owner }}/.fullsend/.github/actions/dispatch@main
        with:
          dispatch_token: ${{ secrets.FULLSEND_DISPATCH_TOKEN }}
